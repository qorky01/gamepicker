<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 스코어판</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9e1ee;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .hero {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 32px; line-height: 1.15; }
    .sub { margin-top: 8px; color: var(--muted); font-size: 15px; }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 20px; box-shadow: var(--shadow);
    }
    .controls {
      padding: 18px; display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr 0.8fr;
      gap: 12px; align-items: end; margin-bottom: 18px;
    }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 13px; color: var(--muted); font-weight: 600; }
    input, select, button, textarea { font: inherit; }
    input[type="text"], input[type="number"], textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 14px; background: #fff; color: var(--text);
    }
    textarea { min-height: 100px; resize: vertical; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      border: none; border-radius: 12px; padding: 12px 14px; cursor: pointer;
      font-weight: 700; transition: transform .05s ease, opacity .2s ease;
    }
    button:active { transform: translateY(1px); }
    .primary { background: var(--accent); color: white; }
    .soft { background: var(--accent-soft); color: var(--accent); }
    .danger { background: #fee2e2; color: var(--danger); }
    .success { background: #d1fae5; color: var(--success); }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; }
    .side, .main { padding: 18px; }
    .side h2, .main h2 { margin: 0 0 14px; font-size: 20px; }
    .helper { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: #fafcff; }
    .stat .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat .value { font-size: 26px; font-weight: 800; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 18px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; background: white; }
    thead th { background: #f8fafc; font-size: 13px; color: var(--muted); position: sticky; top: 0; z-index: 1; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: center; white-space: nowrap; }
    td.name, th.name { text-align: left; min-width: 150px; }
    td.rank, th.rank { width: 72px; }
    td.total, th.total { font-weight: 800; background: #fcfdff; }
    tbody tr:hover { background: #f9fbff; }
    .score-input {
      width: 88px; text-align: center; padding: 10px;
      border: 1px solid var(--line); border-radius: 10px;
    }
    .player-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .player-item {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; background: #fbfdff;
    }
    .empty {
      color: var(--muted); text-align: center; padding: 28px 12px;
      border: 1px dashed var(--line); border-radius: 14px; background: #fcfdff;
    }
    .footer-note { margin-top: 12px; color: var(--muted); font-size: 12px; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      h1 { font-size: 26px; }
      .controls, .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>게임 스코어판</h1>
        <div class="sub">참가자 이름을 넣고, 게임별 점수를 입력하면 총합과 순위가 자동으로 계산됩니다.</div>
      </div>
      <div class="btn-row">
        <button class="soft" id="loadSampleBtn">샘플 불러오기</button>
        <button class="soft" id="saveBtn">저장하기</button>
        <button class="danger" id="resetBtn">전체 초기화</button>
      </div>
    </div>

    <div class="card controls">
      <div class="field">
        <label for="playerName">참가자 이름 추가</label>
        <input id="playerName" type="text" placeholder="예: 민준" />
      </div>
      <div class="field">
        <label for="gameCount">게임 수</label>
        <input id="gameCount" type="number" min="1" max="20" value="3" />
      </div>
      <div class="field">
        <label for="gameTitlePrefix">게임 제목 접두어</label>
        <input id="gameTitlePrefix" type="text" value="게임" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="primary" id="addPlayerBtn">참가자 추가</button>
      </div>
    </div>

    <div class="layout">
      <div class="card side">
        <h2>참가자 관리</h2>
        <div class="helper">한 줄에 한 명씩 여러 명을 한 번에 추가할 수도 있습니다.</div>
        <div class="field">
          <label for="bulkNames">여러 명 한 번에 추가</label>
          <textarea id="bulkNames" placeholder="예:
민준
서준
하준"></textarea>
        </div>
        <div class="btn-row" style="margin-top:10px;">
          <button class="primary" id="bulkAddBtn">한꺼번에 추가</button>
        </div>
        <div class="player-list" id="playerList"></div>
      </div>

      <div class="card main">
        <h2>점수 입력 / 합계 확인</h2>
        <div class="stats">
          <div class="stat">
            <div class="label">참가자 수</div>
            <div class="value" id="playerCountStat">0</div>
          </div>
          <div class="stat">
            <div class="label">설정된 게임 수</div>
            <div class="value" id="gameCountStat">3</div>
          </div>
          <div class="stat">
            <div class="label">현재 1위 점수</div>
            <div class="value" id="topScoreStat">0</div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead id="scoreHead"></thead>
            <tbody id="scoreBody"></tbody>
          </table>
        </div>
        <div class="footer-note">총합 기준으로 순위가 자동 계산되고, 브라우저에 저장해 두었다가 다시 열어도 이어서 사용할 수 있습니다.</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'game_score_board_v1';
    const state = { gameCount: 3, gameTitlePrefix: '게임', players: [] };

    const els = {
      playerName: document.getElementById('playerName'),
      gameCount: document.getElementById('gameCount'),
      gameTitlePrefix: document.getElementById('gameTitlePrefix'),
      addPlayerBtn: document.getElementById('addPlayerBtn'),
      bulkNames: document.getElementById('bulkNames'),
      bulkAddBtn: document.getElementById('bulkAddBtn'),
      playerList: document.getElementById('playerList'),
      scoreHead: document.getElementById('scoreHead'),
      scoreBody: document.getElementById('scoreBody'),
      playerCountStat: document.getElementById('playerCountStat'),
      gameCountStat: document.getElementById('gameCountStat'),
      topScoreStat: document.getElementById('topScoreStat'),
      saveBtn: document.getElementById('saveBtn'),
      resetBtn: document.getElementById('resetBtn'),
      loadSampleBtn: document.getElementById('loadSampleBtn')
    };

    function createEmptyScores(count) {
      return Array.from({ length: count }, () => 0);
    }

    function normalizeScores(scores, count) {
      const safe = Array.isArray(scores) ? [...scores] : [];
      while (safe.length < count) safe.push(0);
      return safe.slice(0, count).map(v => Number(v) || 0);
    }

    function addPlayer(name) {
      const trimmed = String(name || '').trim();
      if (!trimmed) return;
      state.players.push({
        id: crypto.randomUUID(),
        name: trimmed,
        scores: createEmptyScores(state.gameCount)
      });
      render();
    }

    function removePlayer(id) {
      state.players = state.players.filter(p => p.id !== id);
      render();
    }

    function updateGameCount(newCount) {
      const count = Math.max(1, Math.min(20, Number(newCount) || 1));
      state.gameCount = count;
      state.players = state.players.map(player => ({
        ...player,
        scores: normalizeScores(player.scores, count)
      }));
      render();
    }

    function updateScore(playerId, index, value) {
      const player = state.players.find(p => p.id === playerId);
      if (!player) return;
      player.scores[index] = Number(value) || 0;
      render(false);
    }

    function getSortedPlayers() {
      return [...state.players]
        .map(player => ({
          ...player,
          total: player.scores.reduce((sum, score) => sum + (Number(score) || 0), 0)
        }))
        .sort((a, b) => b.total - a.total);
    }

    function render(save = true) {
      els.gameCount.value = state.gameCount;
      els.gameTitlePrefix.value = state.gameTitlePrefix;

      const sortedPlayers = getSortedPlayers();

      els.playerCountStat.textContent = state.players.length;
      els.gameCountStat.textContent = state.gameCount;
      els.topScoreStat.textContent = sortedPlayers[0]?.total ?? 0;

      renderPlayerList();
      renderTable(sortedPlayers);

      if (save) persist();
    }

    function renderPlayerList() {
      if (!state.players.length) {
        els.playerList.innerHTML = '<div class="empty">아직 참가자가 없습니다.</div>';
        return;
      }

      els.playerList.innerHTML = state.players.map((player, index) => `
        <div class="player-item">
          <div><strong>${index + 1}. ${escapeHtml(player.name)}</strong></div>
          <button class="danger" onclick="removePlayerById('${player.id}')">삭제</button>
        </div>
      `).join('');
    }

    function renderTable(sortedPlayers) {
      const prefix = state.gameTitlePrefix.trim() || '게임';
      const gameHeaders = Array.from({ length: state.gameCount }, (_, i) => `<th>${escapeHtml(prefix)} ${i + 1}</th>`).join('');

      els.scoreHead.innerHTML = `
        <tr>
          <th class="rank">순위</th>
          <th class="name">이름</th>
          ${gameHeaders}
          <th class="total">총합</th>
        </tr>
      `;

      if (!sortedPlayers.length) {
        els.scoreBody.innerHTML = `
          <tr>
            <td colspan="${state.gameCount + 3}">
              <div class="empty">참가자를 추가하면 점수판이 표시됩니다.</div>
            </td>
          </tr>
        `;
        return;
      }

      els.scoreBody.innerHTML = sortedPlayers.map((player, rowIndex) => {
        const scoreInputs = player.scores.map((score, scoreIndex) => `
          <td>
            <input
              class="score-input"
              type="number"
              value="${Number(score) || 0}"
              oninput="updatePlayerScore('${player.id}', ${scoreIndex}, this.value)"
            />
          </td>
        `).join('');

        return `
          <tr>
            <td class="rank">${rowIndex + 1}</td>
            <td class="name"><strong>${escapeHtml(player.name)}</strong></td>
            ${scoreInputs}
            <td class="total">${player.total}</td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadSaved() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state.gameCount = Math.max(1, Math.min(20, Number(parsed.gameCount) || 3));
        state.gameTitlePrefix = parsed.gameTitlePrefix || '게임';
        state.players = Array.isArray(parsed.players)
          ? parsed.players.map(p => ({
              id: p.id || crypto.randomUUID(),
              name: p.name || '이름 없음',
              scores: normalizeScores(p.scores, state.gameCount)
            }))
          : [];
      } catch (e) {
        console.error('저장 데이터 불러오기 실패', e);
      }
    }

    function loadSample() {
      state.gameCount = 3;
      state.gameTitlePrefix = '게임';
      state.players = [
        { id: crypto.randomUUID(), name: '민준', scores: [10, 20, 15] },
        { id: crypto.randomUUID(), name: '서준', scores: [15, 12, 18] },
        { id: crypto.randomUUID(), name: '하준', scores: [8, 25, 10] },
        { id: crypto.randomUUID(), name: '지우', scores: [17, 9, 21] }
      ];
      render();
    }

    function resetAll() {
      if (!confirm('참가자와 점수를 모두 초기화할까요?')) return;
      state.gameCount = 3;
      state.gameTitlePrefix = '게임';
      state.players = [];
      localStorage.removeItem(STORAGE_KEY);
      render(false);
    }

    els.addPlayerBtn.addEventListener('click', () => {
      addPlayer(els.playerName.value);
      els.playerName.value = '';
      els.playerName.focus();
    });

    els.playerName.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        els.addPlayerBtn.click();
      }
    });

    els.bulkAddBtn.addEventListener('click', () => {
      const names = els.bulkNames.value.split('\n').map(v => v.trim()).filter(Boolean);
      names.forEach(addPlayer);
      els.bulkNames.value = '';
      render();
    });

    els.gameCount.addEventListener('change', (e) => updateGameCount(e.target.value));
    els.gameTitlePrefix.addEventListener('input', (e) => {
      state.gameTitlePrefix = e.target.value || '게임';
      render();
    });
    els.saveBtn.addEventListener('click', persist);
    els.resetBtn.addEventListener('click', resetAll);
    els.loadSampleBtn.addEventListener('click', loadSample);

    window.removePlayerById = removePlayer;
    window.updatePlayerScore = updateScore;

    loadSaved();
    render(false);
  </script>
</body>
</html>
